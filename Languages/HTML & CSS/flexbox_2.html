<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Header</title>
    <style>
        body{
            margin: 0px;
        }
        p{
            font-family: 'Roboto', Arial, Helvetica, sans-serif;
        }
        .header{
            background-color: lightgoldenrodyellow;
            height: 55px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .left-section{
            background-color: lightcoral;
            width: 150px;
        }
        .middle-section{
            background-color: lightblue;
            flex: 1;
            margin-left: 70px;
            margin-right: 35px;
            max-width: 500px;
            
        }
        .right-section{
            background: lightseagreen;
            width: 200px;
        }
        
    </style>
</head>
<body>
    <div class="header">
        <div class="left-section">
            left
        </div>
        <div class="middle-section">
            <input class="search-bar" type="text" placeholder="search">
        </div>
        <div class="right-section">
            right
        </div>
    </div>

    <div style="margin-bottom: 100px;"></div>


    <div class="flexbox" style="display: flex; margin-bottom: 20px;">
        <div style="background-color: lightblue; width: 200px;">200px</div>
        <div style="background-color: lightcoral; width: 75px;">75px</div>
    </div>

    <div class="flexbox2" style="display: flex; margin-bottom: 20px;">
        <div style="background-color: lightgreen; width: 50px;">item1</div>
        <div style="background-color: lightblue; flex: 1;">item2</div>
        <div style="background-color: lightcoral; width: 75px;">item3</div>
    </div>

    <div class="flexbox3" style="display: flex; margin-bottom: 20px; justify-content: space-between; background-color: black;">
        <div style="background-color: lightgreen; width: 50px;">item1</div>
        <div style="background-color: lightblue; width: 50px;">item2</div>
        <div style="background-color: lightcoral; width: 50px;">item3</div>
        <div style="background-color: lightcoral; width: 50px;">item4</div>
    </div>

    <div class="flexbox4" style="height: 240px; display: flex; flex-direction: row; margin-bottom: 20px; justify-content:space-between; background-color: black; align-items: center;">
        <div style="background-color: lightgreen; width: 50px; height: 50px;">item1</div>
        <div style="background-color: lightblue; width: 50px; height: 50px;">item2</div>
        <div style="background-color: lightcoral; width: 50px; height: 50px;">item3</div>
        <div style="background-color: lightcoral; width: 50px; height: 50px;">item4</div>
    </div>
</body>
</html>
