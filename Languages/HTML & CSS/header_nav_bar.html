<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar - Basic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat&display=swap');
        body{
            margin: 0px;
            background-color: #232323;
        }
        .navbar{
            background-color: transparent;
            height: 60px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
        .left-section{
            background-color: transparent;
            display: flex;
            align-items: center;
            width: 200px;
            padding-left: 20px;
        }
        .logo{
            font-family: 'Montserrat', sans-serif ;
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin: 0;
            width: 100%;
            text-align: center;
        }
        .middle-section{
            background-color: transparent;
            flex: 1;
            margin-left: 20px;
            margin-right: 20px;
        }
        .search-bar{
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            padding: 9px;
            width: 95%;
            border-radius: 15px;
            min-width: 200px;
            max-width: 700px;
            border-color: transparent;
            outline: none;
        }
        .right-section{
            background-color: transparent;
            text-align: end;
            width: 200px;
            padding-right: 20px;
        }
        .download-button{
            padding: 10px;
            color: white;
            background-color: transparent;
            border-radius: 5px;
            border: 1px solid white;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="left-section">
            <p class="logo">YOUTUBE</p>
        </div>
        <div class="middle-section">
            <input class="search-bar" type="text" placeholder="Search">
        </div>
        <div class="right-section">
            <button class="download-button">Download</button>
        </div>
    </header>
</body>
</html>
