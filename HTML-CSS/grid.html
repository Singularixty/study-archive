<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid - CSS</title>
    <link rel="stylesheet" href="css/grid.css">
</head>
<body>
    <div style="display: grid; grid-template-columns: 100px 100px;">
        <div style="background-color: lightblue;">div 1</div>
        <div style="background-color: lightpink;">div 2 <p>hello</p></div>
    </div>

    <div style="display: grid; margin-top: 25px; grid-template-columns: 100px 100px 200px 500px 1fr;">
        <div style="background-color: lightblue;">div 1</div>
        <div style="background-color: lightpink;">div 2</div>
        <div style="background-color: lightgreen;">div 3</div>
        <div style="background-color: lightcyan;">div 4</div>
        <div style="background-color: rgb(26, 98, 98);">div 5</div>
    </div>

    <div style="display: grid; margin-top: 25px; grid-template-columns: 100px 1fr 1fr;">
        <div style="background-color: lightblue;">div 1</div>
        <div style="background-color: lightpink;">1fr</div>
        <div style="background-color: rgb(26, 98, 98);">1fr</div>
    </div>

    <div style="display: grid; 
        margin-top: 25px; 
        grid-template-columns: 1fr 1fr 1fr;
        height: 200px;
        column-gap: 20px;
        row-gap: 20px;">
        <div style="background-color: lightblue;">1fr</div>
        <div style="background-color: lightpink;">1fr</div>
        <div style="background-color: rgb(26, 98, 98);">1fr</div>
        <div style="background-color: lightblue;">1fr</div>
        <div style="background-color: lightpink;">1fr</div>
        <div style="background-color: rgb(26, 98, 98);">1fr</div>
    </div>
</body>
</html>
