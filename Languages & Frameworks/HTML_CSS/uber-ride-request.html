<html>
    <head>
        <title>Uber - Request a drive</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Kanit&display=swap');
            .request-ride{
                font-family: 'Kanit', sans-serif;
                font-size: 20px;
                display: block;
                margin: 0;
                margin-bottom: 8px;
            }
            .input-block{
                display: block;
                margin-bottom: 5px;
                padding: 5 5 5 5;
                border: 0cap;
                background-color: rgb(233, 233, 233);
            }
            .request-now{
                font-family: 'Kanit', sans-serif;
                margin-top: 10px;
                padding: 7 7 7 7;
                background-color: black;
                color: white;
                border: 0;
                cursor: pointer;
                display: inline;
                transition: 0.2s all;
            }

            .schedule-later{
                font-family: 'Kanit', sans-serif;
                margin-top: 10px;
                padding: 7 7 7 7;
                background-color: rgb(210, 210, 210);
                color: black;
                border: 0;
                cursor: pointer;
                display: inline;
                transition: 0.2s all;
            }

            .request-now:hover{
                color: black;
                background-color: rgb(210, 210, 210);
            }        
        </style>
    </head>
    <body>
        <p class="request-ride">Request a Ride now</p>
        <input class="input-block" type="text" placeholder="Enter pickup location">
        <input class="input-block" type="text" placeholder="Enter destination">
        <button class="request-now">Request now</button>
        <button class="schedule-later"> Schedule For Later</button>
    </body>
</html>
