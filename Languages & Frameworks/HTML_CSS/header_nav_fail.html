<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Navigation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat&display=swap');
        body{
            background-color: #232323; 
            margin: 0px;
        }
        .header-bar{
            height: 50px;
            background-color: rgb(111, 62, 166);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding-left: 10px;
            padding-right: 10px;
        }
        .logo{
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            width: 200px;
            color: white;
            background-color: lightblue;
        }

        .searchbox{
            padding: 10px;
            width: 1200px;
            border-radius: 10px;
            background-color: lightcoral;
        }
        .downloadButton{
            padding: 10px;
            background-color: transparent;
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header-bar">
        <div class="left-section" ><h1 class="logo">Home</h1></div>
        <div class="searchbar">
            <input class="searchbox" type="text" placeholder="Search for videos, images, etc..">
        </div>
        <div class="download">
            <button class="downloadButton">Download</button>
        </div>
    </header>
    
</body>
</html>
