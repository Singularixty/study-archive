<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familiar with Grid</title>
    <link rel="stylesheet" href="css/grid_2.css">
</head>
<body>
    <div style="display: grid; grid-template-columns: 200px 75px;">
        <div style="background-color: lightblue;">Div 1</div>
        <div style="background-color: lightcoral;">Div 2</div>
    </div>

    <div style="display: grid; grid-template-columns: 50px 1fr 50px;">
        <div style="background-color: lightblue;">Div 1</div>
        <div style="background-color: lightcoral;">Div 2</div>
        <div style="background-color: lightgreen;">Div 3</div>
    </div>

    <div style="padding-bottom: 20px;"></div>

    <div style="display: grid; 
    grid-template-columns: 1fr 1fr 1fr 1fr;
    column-gap: 20px;
    row-gap: 10px;">
        <div style="background-color: lightblue;">Div 1</div>
        <div style="background-color: lightcoral;">Div 2</div>
        <div style="background-color: lightgreen;">Div 3</div>
        <div style="background-color: lightgoldenrodyellow;">Div 4</div>
        <div style="background-color: lightblue;">Div 5</div>
        <div style="background-color: lightcoral;">Div 6</div>
        <div style="background-color: lightgreen;">Div 7</div>
        <div style="background-color: lightgoldenrodyellow;">Div 8</div>

    <div class="recommended-users">
